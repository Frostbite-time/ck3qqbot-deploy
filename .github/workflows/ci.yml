name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tools/steamcmd-sidecar/package-lock.json

      - name: Install SteamCMD sidecar dependencies
        run: npm ci --prefix tools/steamcmd-sidecar

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Test SteamCMD sidecar TypeScript build
        run: npm --prefix tools/steamcmd-sidecar test

      - name: Run shell behavior tests
        run: |
          set -euo pipefail
          for test_script in tests/*.sh; do
            echo "== ${test_script} =="
            "${test_script}"
          done
